<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Produk Online</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">
            <div class="gambar">
                <img src="/assest/headset.jpg" alt="headset gaming">
            </div>
            <div class="content">
                <h3>Headset Gaming</h3>
                <p class="harga">Rp150.000</p>
                <span class="badge">Diskon 20%</span>
                <button class="btn">Tambah ke Keranjang</button>
            </div>
        </div>

        <div class="card">
            <div class="gambar">
                <img src="/assest/mouse.jpg" alt="mouse">
            </div>
            <div class="content">
                <h3>Mouse Wireless</h3>
                <p class="harga">Rp85.000</p>
                <button class="btn">Tambah ke Keranjang</button>
            </div>
        </div>

        <div class="card">
            <div class="gambar">
                <img src="/assest/keyboard.jpg" alt="keyboard">
            </div>
            <div class="content">
                <h3>Keyboard RGB</h3>
                <p class="harga">Rp200.000</p>
                <button class="btn">Tambah ke Keranjang</button>
            </div>
        </div>

    </div>

</body>

</html>
